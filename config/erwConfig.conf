# Configuration de test complète avec plusieurs erreurs
# Ce fichier doit déclencher 10+ erreurs de validation

# Server 1 : Serveur valide de référence
server {
    listen 8080;
    server_name localhost;
    error_page 400 /error_pages/400.html;
    error_page 404 /error_pages/404.html;
    error_page 500 /error_pages/500.html;
    client_max_body_size 10M;

    location / {
        root ./www;
        index index.html index.htm;
        allowed_methods GET POST;
        autoindex off;
    }

    location /uploads {
        root .;
        allowed_methods GET POST DELETE;
        upload_path ./uploads;
        autoindex on;
    }

    location /cgi-bin/php {
        root .;
        allowed_methods GET POST;
        cgi_extension .php;
        cgi_path /usr/bin/php-cgi;
    }
}

# Server 2 : ERREUR - Port invalide (0)
server {
    listen 0;  # Port 0 invalide
    server_name invalid_port_zero;

    location / {
        root ./www;
        allowed_methods GET;
    }
}

# Server 3 : ERREUR - Port trop grand
server {
    listen 70000;  # Port > 65535
    server_name port_too_high;
    error_page 404 /404.html;
    client_max_body_size 5M;

    location / {
        root ./www;
        index index.html;
        allowed_methods GET POST;
    }
}

# Server 4 : ERREUR - Location avec path invalide (pas de /)
server {
    listen 8081;
    server_name bad_location_path;

    location / {
        root ./www;
        allowed_methods GET;
    }

    location uploads {  # ERREUR : devrait être /uploads
        root ./uploads;
        allowed_methods GET POST;
    }

    location api/v1 {  # ERREUR : devrait être /api/v1
        root ./api;
        allowed_methods GET POST DELETE;
    }
}

# Server 5 : ERREUR - CGI extension sans CGI path
server {
    listen 8082;
    server_name cgi_incomplete;
    client_max_body_size 2M;

    location /scripts {
        root ./scripts;
        cgi_extension .py;  # ERREUR : pas de cgi_path
        allowed_methods GET POST;
    }

    location /php {
        root ./php;
        cgi_extension .php;  # ERREUR : pas de cgi_path
        allowed_methods POST;
    }
}

# Server 6 : ERREUR - Méthodes HTTP invalides
server {
    listen 8083;
    server_name invalid_methods;
    error_page 405 /error_pages/405.html;

    location / {
        root ./www;
        allowed_methods GET INVALID POST;  # ERREUR : INVALID
        autoindex on;
    }

    location /api {
        root ./api;
        allowed_methods PATCH TRACE OPTIONS;  # ERREUR : PATCH et TRACE invalides
    }
}

# Server 7 : ERREUR - Port négatif
server {
    listen -1;  # Port négatif
    server_name negative_port;

    location / {
        root ./www;
    }
}

# Server 8 : Serveur valide complexe
server {
    listen 8084;
    server_name complex_valid www.example.com;
    error_page 400 /errors/400.html;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;
    error_page 502 /errors/502.html;
    error_page 503 /errors/503.html;
    client_max_body_size 50M;

    location / {
        root ./www/site;
        index index.html index.htm default.html;
        allowed_methods GET HEAD;
        autoindex off;
    }

    location /uploads {
        root ./storage;
        upload_path ./storage/uploads;
        allowed_methods GET POST PUT DELETE;
        autoindex on;
    }

    location /api {
        root ./api;
        allowed_methods GET POST PUT DELETE OPTIONS;
    }

    location /static {
        root ./assets;
        allowed_methods GET;
        autoindex on;
    }

    location /cgi-bin/python {
        root ./cgi-bin;
        cgi_extension .py;
        cgi_path /usr/bin/python3;
        allowed_methods GET POST;
    }
}

# Server 9 : ERREUR - Duplicate port avec même server_name
server {
    listen 8085;
    server_name duplicate_test;

    location / {
        root ./www;
        allowed_methods GET;
    }
}

server {
    listen 8085;
    server_name duplicate_test;  # ERREUR : même port + même nom que server 9

    location / {
        root ./www2;
        allowed_methods POST;
    }
}

# Server 10 : Multiple erreurs dans un même serveur
server {
    listen 100000;  # ERREUR : Port trop grand
    server_name multiple_errors;
    client_max_body_size 1G;

    location badpath1 {  # ERREUR : pas de /
        root ./www;
        allowed_methods GET CUSTOM DELETE;  # ERREUR : CUSTOM invalide
    }

    location badpath2 {  # ERREUR : pas de /
        cgi_extension .sh;  # ERREUR : pas de cgi_path
        allowed_methods POST WRONG;  # ERREUR : WRONG invalide
    }
}

# Server 11 : Serveur valide pour vérifier que tout ne plante pas
server {
    listen 8086;
    server_name final_valid;
    error_page 404 /404.html;
    client_max_body_size 20M;

    location / {
        root ./www;
        index index.html;
        allowed_methods GET POST DELETE;
        autoindex off;
    }

    location /files {
        root ./files;
        allowed_methods GET;
        autoindex on;
    }
}

server {
    listen 8090;
    server_name test_size;
    client_max_body_size INVALID;

    location / {
        root ./www;
    }
}

server {
    listen 8091;
    server_name test_size2;
    client_max_body_size 5G;

    location / {
        root ./www;
    }
}
