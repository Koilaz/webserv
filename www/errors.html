<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>Error pages test</title>
	<link rel="stylesheet" href="/css/style.css">
	<link rel="stylesheet" href="/css/errors.css">
	<script src="/js/header.js" defer></script>
	<script src="/js/errors.js" defer></script>
	<script src="/js/footer.js" defer></script>
</head>

<body class="errors-page">
	<main class="page">
		<div class="pageLayout">
			<aside class="marvin">
				<img src="/image/Marvin_error.png" alt="Error Marvin">
			</aside>

			<div class="pageContent">
				<div class="container">
					<div class="error-tester-layout">
						<div class="whiteBox">

								<h1>🔧 Error Pages Tester</h1>
								<p>Test custom error pages</p>

								<div class="error-selector">
									<label for="errorCode">Select an error code:</label>
									<select id="errorCode">
										<option value="">-- Choose an error --</option>
										<option value="400">400 - Bad Request</option>
										<option value="403">403 - Forbidden</option>
										<option value="404">404 - Not Found</option>
										<option value="405">405 - Method Not Allowed</option>
										<option value="413">413 - Payload Too Large</option>
										<option value="504">504 - Gateway Timeout</option>
									</select>
									<button id="testBtn">Test Error</button>
								</div>

								<div id="result" class="result-box"></div>

						</div>

						<div class="whiteBox request-preview">
							<h2>📡 Request Preview</h2>
							<div id="requestDetails">
								<p class="placeholder">Select an error code to see the request details</p>
							</div>
						</div>
					</div>
				</div>
			</div>

			<div class="pageSpacer" aria-hidden="true"></div>
		</div>
	</main>
</body>

</html>
