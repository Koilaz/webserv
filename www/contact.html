<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>Contact</title>
	<link rel="stylesheet" href="/css/style.css">
	<link rel="stylesheet" href="/css/contactForm.css">
	<script>
		(function () {
			function getCookie(name) {
				var nameEQ = name + '=';
				var ca = document.cookie.split(';');
				for (var i = 0; i < ca.length; i++) {
					var c = ca[i];
					while (c.charAt(0) === ' ') c = c.substring(1, c.length);
					if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
				}
				return null;
			}
			var disabled = getCookie('marvin_disabled') === '1';
			var sessionId = getCookie('session_id');
			var marvinSession = getCookie('marvin_session_id');
			if (disabled && sessionId && marvinSession === sessionId) {
				document.documentElement.className += (document.documentElement.className ? ' ' : '') + 'marvin-disabled';
			}
		})();
	</script>
	<script src="/js/header.js" defer></script>
	<script src="/js/footer.js" defer></script>
</head>

<body>
	<main class="page">
		<div class="page-layout">
			<div class="marvin">
				<!-- Add a specific Marvin image for the Contact page here -->
				<!-- Example: <img src="/image/Marvin.png" alt="Contact Marvin"> -->
			</div>
			<div class="whiteBox">
				<h1>Contact Us</h1>

				<form id="contactForm" action="/cgi-bin/py/contact.py" method="POST">
					<label>Your Name:</label>
					<input type="text" name="name" required>

					<label>Your Email:</label>
					<input type="email" name="email" required>

					<label>Your Message:</label>
					<textarea name="message" rows="8" required></textarea>

					<button type="submit">Send</button>
				</form>
			</div>
		</div>

		<div class="pageSpacer" aria-hidden="true"></div>
		</div>
	</main>
</body>

</html>
